name: Build and test

permissions: {}

on: 
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build_test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Build and test
        run: |
          cargo build --verbose
          cargo test --verbose
